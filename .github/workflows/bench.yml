name: smṛti-bench

on:
  push:
    branches: [sutra]
    paths:
      - 'bench/**'
      - 'smrti/**'
      - 'mcp_server.py'
      - '.github/workflows/bench.yml'
  schedule:
    # Weekly regression — Tuesday 06:00 UTC
    - cron: '0 6 * * 2'
  workflow_dispatch:

# Claude arms are run locally against your Max subscription.
# Only the Gemini arm runs in CI — it needs only GEMINI_API_KEY
# set as a repository secret (Settings → Secrets → Actions).

jobs:
  bench:
    name: Gemini smṛti arm + scoring
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to commit results back to repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install smṛti + bench dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[mcp]" google-generativeai mcp jsonschema clingo

      # ── Gemini API + smṛti ───────────────────────────────────────────────
      - name: Gemini API — smṛti
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bench/run_gemini.py --out bench/results/

      # ── Score all results ────────────────────────────────────────────────
      # Includes any Claude or Antigravity result files committed from laptop
      - name: Score results
        run: |
          python bench/score.py bench/results/ --format markdown > bench/results/SCORES.md
          python bench/score.py bench/results/ --format json    > bench/results/scores.json
          cat bench/results/SCORES.md

      # ── Validate manually-committed Antigravity result files ─────────────
      - name: Validate Antigravity result files
        run: |
          python - <<'EOF'
          import json, sys
          from pathlib import Path
          import jsonschema

          schema_file = Path("bench/results/antigravity_schema.json")
          if not schema_file.exists():
              print("No antigravity_schema.json found, skipping validation.")
              sys.exit(0)

          schema = json.loads(schema_file.read_text())
          errors = []
          candidates = [
              f for f in Path("bench/results").glob("antigravity_*.json")
              if "schema" not in f.name and "TEMPLATE" not in f.name
          ]
          if not candidates:
              print("No Antigravity result files to validate.")
              sys.exit(0)

          for f in candidates:
              try:
                  data = json.loads(f.read_text())
                  jsonschema.validate(data, schema)
                  print(f"  ✓ {f.name}")
              except jsonschema.ValidationError as e:
                  print(f"  ✗ {f.name}: {e.message}")
                  errors.append(f.name)

          if errors:
              sys.exit(f"Schema validation failed for: {errors}")
          EOF

      # ── Commit results back to repo ───────────────────────────────────────
      # Creates the commit entirely via the GitHub Git Data API so GitHub
      # produces a verified signature.  Flow: blobs → tree → commit → update ref.
      - name: Commit bench results
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add bench/results/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          REPO="${{ github.repository }}"
          PARENT=$(gh api "repos/${REPO}/git/ref/heads/sutra" --jq '.object.sha')
          BASE_TREE=$(gh api "repos/${REPO}/git/commits/${PARENT}" --jq '.tree.sha')
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%MZ)

          # Upload each staged file as a blob, accumulate tree entries
          TREE_JSON=$(jq -n --arg bt "$BASE_TREE" '{base_tree: $bt, tree: []}')
          for FILE in $(git diff --staged --name-only); do
            BLOB_SHA=$(gh api "repos/${REPO}/git/blobs" \
              --method POST \
              -f "content=$(base64 -w0 "$FILE")" \
              -f "encoding=base64" \
              --jq '.sha')
            TREE_JSON=$(echo "$TREE_JSON" | jq \
              --arg p "$FILE" --arg s "$BLOB_SHA" \
              '.tree += [{"path":$p,"mode":"100644","type":"blob","sha":$s}]')
          done

          # Create tree, commit, and update ref
          TREE_SHA=$(echo "$TREE_JSON" | gh api "repos/${REPO}/git/trees" \
            --method POST --input - --jq '.sha')

          COMMIT_SHA=$(jq -n \
            --arg msg "bench: gemini arm ${TIMESTAMP} [skip ci]" \
            --arg tree "$TREE_SHA" \
            --arg parent "$PARENT" \
            '{message:$msg, tree:$tree, parents:[$parent]}' | \
            gh api "repos/${REPO}/git/commits" \
              --method POST --input - --jq '.sha')

          gh api "repos/${REPO}/git/refs/heads/sutra" \
            --method PATCH -f "sha=${COMMIT_SHA}"

          echo "Committed and pushed: ${COMMIT_SHA}"
